<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- 味噌汁市のシンボル: 碗 (bowl) のシルエット -->
  <rect width="64" height="64" fill="#1C1C1A" rx="8"/>
  <!-- Bowl shape -->
  <path d="M12 26 Q32 44 52 26" stroke="#C9A96E" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <line x1="12" y1="26" x2="12" y2="28" stroke="#C9A96E" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="52" y1="26" x2="52" y2="28" stroke="#C9A96E" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Steam lines -->
  <path d="M24 20 Q26 16 24 12" stroke="#C9A96E" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M32 19 Q34 14 32 10" stroke="#C9A96E" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M40 20 Q42 16 40 12" stroke="#C9A96E" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Bottom -->
  <line x1="22" y1="40" x2="42" y2="40" stroke="#C9A96E" stroke-width="2" stroke-linecap="round"/>
  <!-- M text hint at bottom -->
  <text x="32" y="56" font-family="sans-serif" font-size="8" fill="#C9A96E" text-anchor="middle" font-weight="300" letter-spacing="1">MC</text>
</svg>
