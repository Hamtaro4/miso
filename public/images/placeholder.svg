<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <rect width="1200" height="800" fill="#EDEAE5"/>
  <!-- Grid pattern -->
  <g stroke="#D4CFC8" stroke-width="0.5" opacity="0.8">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="560" x2="1200" y2="560"/>
    <line x1="0" y1="640" x2="1200" y2="640"/>
    <line x1="0" y1="720" x2="1200" y2="720"/>
    <line x1="120" y1="0" x2="120" y2="800"/>
    <line x1="240" y1="0" x2="240" y2="800"/>
    <line x1="360" y1="0" x2="360" y2="800"/>
    <line x1="480" y1="0" x2="480" y2="800"/>
    <line x1="600" y1="0" x2="600" y2="800"/>
    <line x1="720" y1="0" x2="720" y2="800"/>
    <line x1="840" y1="0" x2="840" y2="800"/>
    <line x1="960" y1="0" x2="960" y2="800"/>
    <line x1="1080" y1="0" x2="1080" y2="800"/>
  </g>
  <!-- Building outline -->
  <rect x="300" y="200" width="600" height="400" fill="none" stroke="#B8B0A6" stroke-width="2"/>
  <rect x="380" y="280" width="100" height="140" fill="none" stroke="#B8B0A6" stroke-width="1.5"/>
  <rect x="550" y="280" width="100" height="140" fill="none" stroke="#B8B0A6" stroke-width="1.5"/>
  <rect x="720" y="280" width="100" height="140" fill="none" stroke="#B8B0A6" stroke-width="1.5"/>
  <rect x="440" y="460" width="120" height="140" fill="none" stroke="#B8B0A6" stroke-width="1.5"/>
  <line x1="300" y1="200" x2="240" y2="160" stroke="#B8B0A6" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="900" y1="200" x2="960" y2="160" stroke="#B8B0A6" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="240" y1="160" x2="960" y2="160" stroke="#B8B0A6" stroke-width="1" stroke-dasharray="4 4"/>
  <!-- Label -->
  <text x="600" y="730" font-family="'Inter', sans-serif" font-size="14" fill="#A09890" text-anchor="middle" letter-spacing="4">PHOTO</text>
</svg>
